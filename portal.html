<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <title>Download ID Card | SSF West Bengal</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center py-8 px-4 antialiased relative overflow-x-hidden">
    
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-emerald-300 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-indigo-300 rounded-full mix-blend-multiply filter blur-[128px] opacity-40 animate-pulse" style="animation-delay: 2s;"></div>

    <div class="w-full max-w-[720px] relative z-10 my-auto animate-fade-in-up">
        
        <div id="searchSection" class="max-w-sm mx-auto w-full bg-white/95 backdrop-blur-xl p-8 rounded-[2rem] shadow-2xl border border-white/60">
            
            <div class="text-center flex flex-col items-center mb-8">
                <div class="w-16 h-16 bg-gradient-to-br from-emerald-500 to-emerald-700 rounded-2xl flex items-center justify-center text-white text-2xl font-cooper shadow-lg mb-4 transform hover:scale-105 transition-transform">SSF</div>
                <h2 class="text-2xl font-black tracking-tight text-slate-900 leading-tight">Member Portal</h2>
                <p class="text-[10px] text-emerald-600 font-bold tracking-widest mt-1.5 uppercase font-mono bg-emerald-50 px-3 py-1 rounded-full border border-emerald-100">Download Digital ID</p>
            </div>

            <form id="searchForm" class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase tracking-wider font-mono pl-1">Registered Mobile No.</label>
                    <div class="relative">
                        <i class="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input type="text" id="searchPhone" required pattern="\d{10}" maxlength="10" placeholder="10 Digit Number" class="w-full h-12 bg-slate-50/50 border border-slate-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 rounded-xl pl-10 pr-4 text-sm outline-none transition-all font-bold text-slate-800 tracking-wider" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 mb-1.5 uppercase tracking-wider font-mono pl-1">Date of Birth</label>
                    <div class="relative">
                        <i class="fa-solid fa-calendar-days absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs"></i>
                        <input type="date" id="searchDob" required class="w-full h-12 bg-slate-50/50 border border-slate-200 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 rounded-xl pl-10 pr-4 text-sm outline-none transition-all font-bold text-slate-800">
                    </div>
                </div>
                <button type="submit" id="searchBtn" class="w-full mt-2 bg-slate-900 hover:bg-emerald-600 text-white font-bold text-xs py-3.5 rounded-xl shadow-lg hover:shadow-emerald-500/30 transform hover:-translate-y-0.5 active:scale-95 transition-all uppercase tracking-wider flex items-center justify-center gap-2">
                    <i class="fa-solid fa-magnifying-glass"></i> Find Membership
                </button>
            </form>
            <div id="errorMessage" class="hidden mt-4 p-3 bg-rose-50 text-rose-600 text-xs font-bold rounded-xl border border-rose-100 text-center animate-fade-in-up"></div>
        </div>

       <div id="resultSection" class="hidden w-full flex flex-col items-center">
            <button onclick="resetPortal()" class="mb-4 text-xs font-black uppercase tracking-wider text-slate-500 hover:text-slate-900 bg-white/50 backdrop-blur px-4 py-2 rounded-full shadow-sm transition-all flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Start Over
            </button>
            
            <div id="cardTargetNode" class="w-full shadow-2xl rounded-3xl overflow-hidden border border-white/60 mb-6 bg-white"></div>
            
            <button id="downloadBtn" onclick="downloadDigitalCardAsPDF(event)" class="w-full bg-rose-600 hover:bg-rose-700 text-white font-bold py-4 rounded-2xl shadow-xl hover:shadow-rose-500/30 transform hover:-translate-y-0.5 active:scale-95 transition-all uppercase tracking-wider flex items-center justify-center gap-2 text-sm">
                <i class="fa-solid fa-lock text-lg"></i> Download Secure PDF
            </button>
        </div>

    </div>

    <script src="supabase.js"></script>
    <script src="portal.js"></script>
</body>
</html>
